<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feelings History - Paulo</title>

    <link rel="stylesheet" href="./style.css" />
</head>
<body data-theme="dark">
    <div class="app">
        <header class="app-header">
            <div class="title-block">
                <h1>Feelings History</h1>
                <p class="subtitle">See what you felt and wrote on different days.</p>
            </div>

            <nav class="app-nav">
                <a href="index.html" class="nav-link">Quiz</a>
                <a href="practice.html" class="nav-link">Practice Area</a>
                <a href="feelings.html" class="nav-link">Feelings</a>
                <a href="feelings-history.html" class="nav-link nav-link-active">History</a>
            </nav>

            <!-- Theme toggle -->
            <label class="theme-toggle">
                <input type="checkbox" id="themeToggle" />
                <span class="toggle-track">
                    <span class="toggle-thumb"></span>
                </span>
                <span class="toggle-label">Dark mode</span>
            </label>
        </header>

        <main class="card">
            <h2 class="feeling-title">Your saved feelings 📘</h2>
            <p class="feeling-reflect-text" style="margin-bottom: 0.9rem;">
                Each time you saved your answer on the Feelings page, it was stored here.
            </p>

            <div class="history-actions">
                <button id="clearHistoryBtn" class="history-clear-btn">
                    Clear all history
                </button>
            </div>

            <section id="historyList" class="history-list">
                <!-- Filled by script.js -->
            </section>
        </main>
    </div>

    <script src="./script.js"></script>
</body>
</html>
