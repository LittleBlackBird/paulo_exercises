<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Music Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body data-theme="light">
  <header class="app-header">
    <div id="nav_bar"></div>
  </header>

  <main class="page">
    <h1>Music Game 🎵</h1>
    <p class="muted">
      <strong>Phase 1:</strong> hear ONE note and guess which of the 7 notes (C D E F G A B) is playing.<br>
      <strong>Phase 2:</strong> hear TWO notes in a row and guess BOTH, in order! 1 or 2 players.
    </p>

    <div class="card">
      <div class="row">
        <label>
          Mode:
          <select id="modeSelect">
            <option value="1">1 Player</option>
            <option value="2">2 Players</option>
          </select>
        </label>

        <label>
          Rounds per phase:
          <input id="roundsInput" type="number" min="1" max="50" value="10" />
        </label>

        <label>
          Octave:
          <select id="octaveSelect">
            <option value="3">3 (lower)</option>
            <option value="4" selected>4 (middle)</option>
            <option value="5">5 (higher)</option>
          </select>
        </label>

        <button id="startBtn">Start / Reset</button>
        <button id="playBtn" disabled>Play Note</button>
        <button id="replayBtn" disabled title="Replays the notes — but you won't score this round">🔁 Hear it again</button>
        <button id="testToneBtn">Test Tone (A4)</button>
      </div>

      <div class="grid-notes">
        <button class="noteBtn" data-note="C" disabled>C</button>
        <button class="noteBtn" data-note="D" disabled>D</button>
        <button class="noteBtn" data-note="E" disabled>E</button>
        <button class="noteBtn" data-note="F" disabled>F</button>
        <button class="noteBtn" data-note="G" disabled>G</button>
        <button class="noteBtn" data-note="A" disabled>A</button>
        <button class="noteBtn" data-note="B" disabled>B</button>
      </div>

      <p id="status" class="muted" style="margin-top:12px;">Click Start / Reset to begin.</p>
    </div>

    <div class="card">
      <h3>Score</h3>
      <pre id="scoreBox">—</pre>
    </div>
  </main>

  <script>
    /**********************************************************************
     * SECTION 1 — WEB AUDIO
     *
     * We generate sound using the Web Audio API (Oscillator + Gain
     * envelope). Browsers require a user gesture to allow audio, which
     * is why we call `unlockAudio()` inside click handlers.
     **********************************************************************/

    // Frequencies for octave 4 (C4..B4). Other octaves are x2 or /2.
    const NOTE_FREQS = {
      "C": 261.6256, "D": 293.6648, "E": 329.6276, "F": 349.2282,
      "G": 391.9954, "A": 440.0000, "B": 493.8833
    };

    const NOTES = ["C", "D", "E", "F", "G", "A", "B"];

    let audioCtx = null;

    function ensureAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }

    function freqForOctave(note, octave) {
      // Base is octave 4. Every octave up doubles frequency.
      return NOTE_FREQS[note] * Math.pow(2, octave - 4);
    }

    async function unlockAudio() {
      const ctx = ensureAudio();
      if (ctx.state !== "running") await ctx.resume();
    }

    function playTone(freq, seconds = 0.9) {
      return new Promise(async (resolve) => {
        const ctx = ensureAudio();
        if (ctx.state !== "running") await ctx.resume();

        const osc = ctx.createOscillator();
        const gain = ctx.createGain();

        osc.type = "sine";
        osc.frequency.setValueAtTime(freq, ctx.currentTime);

        // Envelope (avoids clicking sounds)
        const now = ctx.currentTime;
        const end = now + seconds;

        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.25, now + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, end);

        osc.connect(gain);
        gain.connect(ctx.destination);

        osc.onended = () => resolve();
        osc.start(now);
        osc.stop(end);
      });
    }

    async function playNote(note, octave, seconds = 0.9) {
      await playTone(freqForOctave(note, octave), seconds);
    }

    // Small pause between the two notes of a Phase 2 sequence
    const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

    /**********************************************************************
     * SECTION 2 — GAME LOGIC (pure JavaScript)
     *
     * This game was originally written in Python and executed with
     * Pyodide. It has been converted to JavaScript, so no runtime needs
     * to be downloaded — the game is ready instantly.
     *
     * PHASES:
     *   Phase 1 — each round plays 1 note; guess it.
     *   Phase 2 — each round plays 2 notes IN A ROW; guess both, in order.
     * When Phase 1's rounds finish, Phase 2 starts automatically.
     **********************************************************************/

    const game = {
      mode: 1,
      roundsPerPhase: 10,
      octave: 4,

      phase: 1,          // 1 = single note, 2 = two notes in a row
      round: 0,          // round inside the current phase
      turn: 1,           // player whose turn it is
      targets: null,     // array of notes to guess this round (1 or 2)
      guessPos: 0,       // which note of the sequence is being guessed
      roundHadMistake: false,
      replayedThisRound: false, // used "Hear it again" → this round can't score
      started: false,

      // score per phase: score[phase][player]
      score: { 1: { 1: 0, 2: 0 }, 2: { 1: 0, 2: 0 } },

      reset(mode, rounds, octave) {
        this.mode = mode;
        this.roundsPerPhase = rounds;
        this.octave = octave;
        this.phase = 1;
        this.round = 0;
        this.turn = 1;
        this.targets = null;
        this.guessPos = 0;
        this.roundHadMistake = false;
        this.replayedThisRound = false;
        this.started = true;
        this.score = { 1: { 1: 0, 2: 0 }, 2: { 1: 0, 2: 0 } };
      },

      isFinished() {
        return this.phase === 2 && this.round >= this.roundsPerPhase && !this.targets;
      },

      // A round is "active" once notes have been played and not yet fully guessed.
      roundActive() {
        return !!this.targets;
      },

      // Replays the current round's notes. Using it costs the point for
      // this round (roundHadMistake stays true so it can't score).
      replayCurrent() {
        if (!this.targets) return null;
        this.replayedThisRound = true;
        this.roundHadMistake = true;
        return this.targets.slice();
      },

      // Prepares the next round. Returns info about it, or null if over.
      nextRound() {
        if (!this.started) return { ok: false, msg: "Start the game first." };

        // Move to Phase 2 when Phase 1's rounds are over
        if (this.round >= this.roundsPerPhase) {
          if (this.phase === 1) {
            this.phase = 2;
            this.round = 0;
          } else {
            return { ok: false, msg: "Game finished." };
          }
        }

        this.round += 1;
        this.turn = this.mode === 1 ? 1 : (this.round % 2 === 1 ? 1 : 2);

        const howMany = this.phase === 1 ? 1 : 2;
        this.targets = Array.from({ length: howMany },
          () => NOTES[Math.floor(Math.random() * NOTES.length)]);
        this.guessPos = 0;
        this.roundHadMistake = false;
        this.replayedThisRound = false;

        return {
          ok: true,
          phase: this.phase,
          round: this.round,
          roundsTotal: this.roundsPerPhase,
          turn: this.turn,
          targets: this.targets.slice(),
          octave: this.octave,
        };
      },

      // Handles one guessed note. In Phase 2 this is called twice per round.
      guess(note) {
        if (!this.targets) return { ok: false, msg: "Press 'Play Note' first." };

        note = String(note || "").trim().toUpperCase();
        if (!NOTES.includes(note)) return { ok: false, msg: "Invalid note." };

        const expected = this.targets[this.guessPos];
        const correct = note === expected;
        if (!correct) this.roundHadMistake = true;

        this.guessPos += 1;
        const sequenceDone = this.guessPos >= this.targets.length;

        let roundWon = false;
        if (sequenceDone) {
          roundWon = !this.roundHadMistake;
          if (roundWon) this.score[this.phase][this.turn] += 1;
          this.targets = null;
        }

        const phaseJustEnded = sequenceDone && this.round >= this.roundsPerPhase;

        return {
          ok: true,
          correct,
          sequenceDone,
          roundWon,
          allNotesCorrect: sequenceDone && !this._hadWrongNote(),
          replayed: this.replayedThisRound,
          notesRemaining: sequenceDone ? 0 : this.targets.length - this.guessPos,
          player: this.turn,
          phase: this.phase,
          round: this.round,
          roundsTotal: this.roundsPerPhase,
          phaseJustEnded,
          gameFinished: phaseJustEnded && this.phase === 2,
        };
      },

      scoreboardText() {
        const p1 = `Phase 1 (one note)      — Player 1: ${this.score[1][1]}` +
          (this.mode === 2 ? ` | Player 2: ${this.score[1][2]}` : "");
        const p2 = `Phase 2 (two in a row)  — Player 1: ${this.score[2][1]}` +
          (this.mode === 2 ? ` | Player 2: ${this.score[2][2]}` : "");
        const extra = this.mode === 2 ? "\nTurn alternates by round (odd = P1, even = P2)." : "";
        return `${p1}\n${p2}\nCurrent: Phase ${this.phase}, round ${this.round}/${this.roundsPerPhase}${extra}`;
      },
    };

    /**********************************************************************
     * SECTION 3 — UI
     **********************************************************************/

    const statusEl = document.getElementById("status");
    const scoreBox = document.getElementById("scoreBox");
    const startBtn = document.getElementById("startBtn");
    const playBtn = document.getElementById("playBtn");
    const replayBtn = document.getElementById("replayBtn");
    const modeSelect = document.getElementById("modeSelect");
    const roundsInput = document.getElementById("roundsInput");
    const octaveSelect = document.getElementById("octaveSelect");
    const noteButtons = Array.from(document.querySelectorAll(".noteBtn"));

    // Master on/off for the whole play area (used at start / game over).
    function setButtonsEnabled(enabled) {
      playBtn.disabled = !enabled;
      noteButtons.forEach(b => b.disabled = !enabled);
      replayBtn.disabled = true; // replay only enabled during an active round
    }

    // Reflects whether a round is currently in progress:
    //   • during a round → Play is locked (can't discard it), notes + replay on
    //   • between rounds  → Play on, notes + replay off
    function syncControls() {
      const active = game.roundActive();
      playBtn.disabled = active;
      replayBtn.disabled = !active;
      noteButtons.forEach(b => b.disabled = !active);
    }

    function updateScoreboard() {
      scoreBox.textContent = game.scoreboardText();
    }

    function startGame() {
      const mode = parseInt(modeSelect.value, 10);
      const rounds = Math.max(1, Math.min(50, parseInt(roundsInput.value || "10", 10)));
      const octave = parseInt(octaveSelect.value, 10);

      game.reset(mode, rounds, octave);

      statusEl.textContent = "Game started — Phase 1 (one note). Click 'Play Note'.";
      playBtn.textContent = "Play Note";
      updateScoreboard();
      setButtonsEnabled(true);
      syncControls(); // no active round yet → Play on, notes/replay off
    }

    // Plays the notes of the CURRENT round (used by both a new round and replay).
    async function playCurrentNotes() {
      const octave = parseInt(octaveSelect.value, 10);
      if (game.phase === 1) {
        await playNote(game.targets[0], octave);
      } else {
        await playNote(game.targets[0], octave, 0.8);
        await sleep(250);
        await playNote(game.targets[1], octave, 0.8);
      }
    }

    async function playNewRoundAndSound() {
      // Guard: never discard an active round by starting a new one.
      if (game.roundActive()) {
        statusEl.textContent = "Finish guessing this round first — or use 🔁 Hear it again.";
        return;
      }

      const info = game.nextRound();

      if (!info.ok) {
        statusEl.textContent = info.msg || "Game finished.";
        setButtonsEnabled(false);
        return;
      }

      game.octave = parseInt(octaveSelect.value, 10);
      syncControls(); // a round is now active → lock Play, enable notes + replay

      if (info.phase === 1) {
        playBtn.textContent = "Play Note";
        statusEl.textContent =
          `Phase 1 — Round ${info.round}/${info.roundsTotal} — Player ${info.turn}: listen and guess the note.`;
      } else {
        playBtn.textContent = "Play 2 Notes";
        statusEl.textContent =
          `Phase 2 — Round ${info.round}/${info.roundsTotal} — Player ${info.turn}: listen to TWO notes and guess them IN ORDER.`;
      }
      await playCurrentNotes();
      if (info.phase === 2) statusEl.textContent += " Now click the 1st note you heard.";
      updateScoreboard();
    }

    function makeGuess(note) {
      const res = game.guess(note);

      if (!res.ok) {
        statusEl.textContent = res.msg || "Invalid action.";
        return;
      }

      if (!res.sequenceDone) {
        // Phase 2, first of the two notes guessed
        statusEl.textContent = res.correct
          ? `✅ First note right! Now click the 2nd note you heard.`
          : `❌ First note was not that one… still try the 2nd note you heard!`;
        return;
      }

      // The round's sequence is complete
      if (res.phase === 1) {
        statusEl.textContent = res.roundWon
          ? `✅ Correct! Player ${res.player} scores. Click 'Play Note' for the next round.`
          : `❌ Not this one. Click 'Play Note' for the next round.`;
      } else {
        statusEl.textContent = res.roundWon
          ? `✅ BOTH notes right, in order! Player ${res.player} scores. Click 'Play 2 Notes' for the next round.`
          : `❌ Not quite — you need both notes right, in order. Click 'Play 2 Notes' to try a new round.`;
      }

      updateScoreboard();

      if (res.gameFinished) {
        statusEl.textContent += " 🏁 Game finished! Press Start / Reset to play again.";
        setButtonsEnabled(false);
        playBtn.textContent = "Play Note";
        return;
      } else if (res.phaseJustEnded) {
        statusEl.textContent +=
          " 🎉 Phase 1 complete — PHASE 2 unlocked: now you'll hear TWO notes in a row!";
        playBtn.textContent = "Play 2 Notes";
      }

      // Round finished (not the game) → unlock Play for the next one.
      syncControls();
    }

    document.getElementById("testToneBtn").addEventListener("click", async () => {
      await unlockAudio();
      await playTone(440, 0.6);
    });

    startBtn.addEventListener("click", async () => {
      await unlockAudio();
      startGame();
    });

    playBtn.addEventListener("click", async () => {
      await unlockAudio();
      await playNewRoundAndSound();
    });

    // "Hear it again" — replays the current round's notes. Using it means
    // this round can't score (a small, fair cost for the extra help).
    replayBtn.addEventListener("click", async () => {
      if (!game.roundActive()) return;
      await unlockAudio();
      const firstTime = !game.replayedThisRound;
      game.replayCurrent();
      await playCurrentNotes();
      if (firstTime) {
        statusEl.textContent = "🔁 Replayed — this round won't score, but take your time and guess!";
      }
    });

    // When the user clicks a note button:
    // 1) we play THAT note immediately (instant feedback)
    // 2) then we submit it as a guess (right or wrong)
    noteButtons.forEach(btn => {
      btn.addEventListener("click", async () => {
        await unlockAudio();
        const octave = parseInt(octaveSelect.value, 10);
        await playNote(btn.dataset.note, octave, 0.5);
        makeGuess(btn.dataset.note);
      });
    });

    setButtonsEnabled(false);
  </script>

  <script src="js/load_nav.js"></script>
  <script src="js/ui.js"></script>
</body>
</html>
