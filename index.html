<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercises for Paulo</title>

    <!-- Pyodide for Python execution on the quiz page -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.22.1/full/pyodide.js"></script>

    <!-- External CSS file -->
    <link rel="stylesheet" href="./style.css"/>
</head>
<body data-theme="light">
    <div class="app">
        <header class="app-header">
            <div class="title-block">
                <h1>Math Quiz</h1>
                <p class="subtitle">-</p>
            </div>

            <nav class="app-nav">
                <a href="index.html" class="nav-link nav-link-active">Quiz</a>
                <a href="practice.html" class="nav-link">Practice Area</a>
                <a href="feelings.html" class="nav-link">Reading & Writing</a>
            </nav>

            <!-- Theme toggle -->
            <label class="theme-toggle">
                <input type="checkbox" id="themeToggle" />
                <span class="toggle-track">
                    <span class="toggle-thumb"></span>
                </span>
                <span class="toggle-label">Dark mode</span>
            </label>
        </header>

        <main class="card">
            <label for="num_problems" class="question-label">
                Paulo, how many problems do you want to solve?
            </label>

            <div class="controls-row">
                <input type="number" id="num_problems" min="1" required>
                <button id="generateBtn">Generate Problems</button>
            </div>

            <ol id="problems" class="problems-list"></ol>

            <!-- Tenor GIF -->
            <div class="tenor-wrapper">
                <div class="tenor-gif-embed"
                    data-postid="9311852797231273232"
                    data-share-method="host"
                    data-aspect-ratio="1"
                    data-width="10%">
                    <a href="https://tenor.com/view/bare-bones-steve-wave-minecraft-gif-9311852797231273232">
                        Bare Bones Steve Wave Sticker
                    </a>
                    from
                    <a href="https://tenor.com/search/bare+bones-stickers">Bare Bones Stickers</a>
                </div>
            </div>
        </main>
    </div>

    <script async src="https://tenor.com/embed.js"></script>
    <script src="./script.js"></script>
</body>
</html>
